name: Sync to Template

on:
  push:
    branches: [main]
    paths:
      - '*.gs'
      - '*.html'
      - 'appsscript.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          repository: hughsibbele/AI-Documenter-Template
          token: ${{ secrets.TEMPLATE_REPO_TOKEN }}
          path: template

      - name: Sync code files
        run: |
          # Remove old code files from template (but not README or other template-only files)
          rm -f template/*.gs template/*.html template/appsscript.json
          # Copy current code files from source
          cp source/*.gs source/*.html source/appsscript.json template/

      - name: Check for changes
        id: changes
        working-directory: template
        run: |
          git diff --quiet && git diff --cached --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        working-directory: template
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync code from AI_Documenter"
          git push
